<!-- Password Change Confirmation Modal -->
<div id="passwordModal" class="modal">
    <div class="modal-content">
        <h3>Change Password</h3>
        <p>Are you sure you want to change your password?</p>
        
        <!-- Confirm New Password Field -->
        <div class="confirm-password-group">
            <label for="confirm_new_password">Confirm New Password *</label>
            <input type="password" id="confirm_new_password" name="confirm_new_password" placeholder="Re-enter new password" required>
            <div id="passwordMatchError" class="error-message" style="display: none; color: #ff0000; margin-top: 5px; font-size: 0.9em;">Passwords do not match!</div>
        </div>
        
        <div class="modal-buttons">
            <button class="modal-btn confirm-btn" id="confirmPasswordChange">Yes, Change Password</button>
            <button class="modal-btn cancel-btn" onclick="closePasswordModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- Success Notification Toast -->
<div id="notification" class="notification"></div>
