<!-- Profile Image Upload Confirmation Modal -->
<div id="uploadModal" class="modal">
    <div class="modal-content">
        <h3>Upload Profile Picture</h3>
        <p>Are you sure you want to upload this profile picture?</p>
        
        <div class="image-preview-container" style="margin: 15px 0;">
            <img id="previewImage" src="" alt="Preview" style="max-width: 150px; border: 2px solid #000000; padding: 5px;">
        </div>
        
        <div class="modal-buttons">
            <button class="modal-btn confirm-btn" id="confirmUpload">Yes, Upload</button>
            <button class="modal-btn cancel-btn" onclick="closeUploadModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- Profile Image Delete Confirmation Modal -->
<div id="deleteModal" class="modal">
    <div class="modal-content">
        <h3>Delete Profile Picture</h3>
        <p>Are you sure you want to delete your profile picture?</p>
        <p style="color: #ff0000; font-size: 0.9em;">This action cannot be undone.</p>
        
        <div class="modal-buttons">
            <button class="modal-btn confirm-btn" id="confirmDelete">Yes, Delete</button>
            <button class="modal-btn cancel-btn" onclick="closeDeleteModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- Success Notification Toast -->
<div id="notification" class="notification"></div>
