<!-- Profile Image Modals -->
<div id="uploadModal" class="modal">
    <div class="modal-content">
        <h3>Upload Profile Image</h3>
        <p>Are you sure you want to upload this image?</p>
        <div class="modal-buttons">
            <button class="modal-btn confirm-btn" id="confirmUpload">Yes</button>
            <button class="modal-btn cancel-btn" onclick="closeUploadModal()">No</button>
        </div>
    </div>
</div>

<div id="deleteModal" class="modal">
    <div class="modal-content">
        <h3>Delete Profile Image</h3>
        <p>Are you sure you want to delete this image?</p>
        <div class="modal-buttons">
            <button class="modal-btn confirm-btn" id="confirmDelete">Yes</button>
            <button class="modal-btn cancel-btn" onclick="closeDeleteModal()">No</button>
        </div>
    </div>
</div>

<!-- Notification Toast -->
<div id="notification" class="notification"></div>
