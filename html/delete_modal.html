<!-- Black and White Delete Modal HTML -->
<div id="deleteModal" class="bw-modal-overlay">
    <div class="bw-modal-container">
        <div class="bw-modal-header">
            <h3>⚠️ CONFIRM DELETION</h3>
        </div>
        <div class="bw-modal-content">
            <p>Are you sure you want to delete this intern?</p>
            <div class="intern-info">
                <div><strong>Name:</strong> <span id="modalInternName"></span></div>
                <div><strong>Email:</strong> <span id="modalInternEmail"></span></div>
            </div>
            <p class="warning-text">This action cannot be undone. All data related to this intern will be permanently removed.</p>
        </div>
        <div class="bw-modal-footer">
            <button class="bw-modal-btn bw-modal-btn-cancel" onclick="closeDeleteModal()">CANCEL</button>
            <button class="bw-modal-btn bw-modal-btn-delete" id="confirmDeleteBtn">DELETE</button>
        </div>
    </div>
</div>
